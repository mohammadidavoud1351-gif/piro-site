<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مقایسه رنگ دیوار</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a1a; font-family: Tahoma, sans-serif; color: #fff; }
.top { padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; background: #111; }
.top h1 { font-size: 16px; font-weight: 400; letter-spacing: 1px; }
.btns { display: flex; gap: 12px; }
.btn { padding: 10px 28px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-family: Tahoma; }
.btn-apply { background: #8B2635; color: #fff; }
.btn-apply:hover { background: #6E1D29; }
.btn-cancel { background: #333; color: #ccc; }
.btn-cancel:hover { background: #444; }
.compare { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 64px); }
.side { position: relative; overflow: hidden; }
.side img { width: 100%; height: 100%; object-fit: cover; display: block; }
.label { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.6); color: #fff; padding: 6px 18px; border-radius: 20px;
  font-size: 13px; white-space: nowrap; backdrop-filter: blur(4px); }
.divider { position: absolute; top: 0; right: 50%; width: 2px; height: 100%; background: rgba(255,255,255,.3); z-index: 10; pointer-events: none; }
</style>
</head>
<body>
<div class="top">
  <h1>مقایسه رنگ دیوار — PIRO Hero Image</h1>
  <div class="btns">
    <button class="btn btn-cancel" onclick="window.close()">بستن</button>
    <button class="btn btn-apply" onclick="applyChange()">✓ اعمال رنگ جدید</button>
  </div>
</div>
<div class="compare">
  <div class="side">
    <img src="images/hero-alto.jpg" alt="قبل">
    <div class="label">قبل — سبز زیتونی</div>
  </div>
  <div class="side">
    <img src="images/hero-alto-preview.jpg" alt="بعد">
    <div class="label">بعد — گریج گرم</div>
  </div>
</div>

<script>
function applyChange() {
  if (confirm('رنگ جدید روی فایل اصلی اعمال شود؟')) {
    fetch('_apply-wall.php').catch(()=>{});
    alert('لطفاً از Claude Code بخواهید فایل را جایگزین کند.');
  }
}
</script>
<script>
(function() {
  var btn = document.createElement('button');
  btn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
  btn.style.cssText = 'position:fixed;bottom:24px;left:24px;width:56px;height:56px;border-radius:50%;background:#1a1a1a;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:9999;box-shadow:0 2px 12px rgba(0,0,0,0.15)';
  var iframe = document.createElement('iframe');
  iframe.src = 'https://khaneh-piro-chat-pqtvg5jj1-piro-co.vercel.app';
  iframe.style.cssText = 'position:fixed;bottom:92px;left:24px;width:340px;height:480px;border:none;border-radius:16px;z-index:9998;box-shadow:0 8px 32px rgba(0,0,0,0.12);display:none';
  btn.onclick = function() {
    iframe.style.display = iframe.style.display === 'none' ? 'block' : 'none';
  };
  document.body.appendChild(btn);
  document.body.appendChild(iframe);
})();
</script>
</body>
</html>
