<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل ادمین | PIRO</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #F3F4F6; min-height: 100vh; direction: rtl; color: #1A1A1A; }

/* ── Login ── */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: #fff; padding: 48px 40px; max-width: 380px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo span { font-size: 28px; font-weight: 700; letter-spacing: 0.15em; color: #8B2635; font-family: 'Georgia', serif; }
.login-logo p { font-size: 12px; color: #9CA3AF; margin-top: 4px; letter-spacing: 0.05em; }
.login-field { margin-bottom: 20px; }
.login-field label { font-size: 12px; color: #6B7280; display: block; margin-bottom: 6px; }
.login-field input {
  width: 100%; height: 48px; border: 1.5px solid #E5E7EB; padding: 0 16px;
  font-size: 14px; color: #111; outline: none; background: #fff;
  direction: ltr; letter-spacing: 0.08em; transition: border-color 0.2s;
}
.login-field input:focus { border-color: #8B2635; }
.login-field input.err { border-color: #EF4444; }
.login-err { font-size: 12px; color: #EF4444; margin-top: 6px; display: none; }
.login-err.show { display: block; }
.btn-login { width: 100%; height: 48px; background: #8B2635; color: #fff; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.btn-login:hover { background: #6E1D29; }

/* ── Admin layout ── */
.admin-layout { display: flex; min-height: 100vh; }

/* ── Sidebar ── */
.admin-sidebar { width: 220px; background: #1A1A1A; color: #fff; flex-shrink: 0; display: flex; flex-direction: column; }
.sidebar-logo { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-logo .brand { font-size: 18px; font-weight: 700; letter-spacing: 0.12em; color: #E8C4BC; font-family: Georgia, serif; }
.sidebar-logo .sub { font-size: 11px; color: #9CA3AF; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 16px 0; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 20px; font-size: 13px; color: #9CA3AF; cursor: pointer; transition: all 0.2s; }
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active { background: rgba(139,38,53,0.3); color: #E8C4BC; }
.nav-item svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.8; flex-shrink: 0; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
.btn-logout { background: none; border: 1px solid rgba(255,255,255,0.2); color: #9CA3AF; padding: 8px 16px; font-size: 12px; cursor: pointer; width: 100%; transition: all 0.2s; }
.btn-logout:hover { border-color: #fff; color: #fff; }

/* ── Main content ── */
.admin-main { flex: 1; overflow: auto; }
.admin-topbar { background: #fff; padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #E5E7EB; }
.topbar-title { font-size: 16px; font-weight: 600; color: #1A1A1A; }
.topbar-date { font-size: 12px; color: #9CA3AF; }
.admin-content { padding: 28px; }

/* ── Stats cards ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card { background: #fff; padding: 20px; border-right: 3px solid transparent; }
.stat-card.waiting  { border-color: #EAB308; }
.stat-card.making   { border-color: #3B82F6; }
.stat-card.ready    { border-color: #7C3AED; }
.stat-card.sent     { border-color: #F97316; }
.stat-card.delivered{ border-color: #10B981; }
.stat-card.canceled { border-color: #EF4444; }
.stat-num { font-size: 28px; font-weight: 700; color: #1A1A1A; margin-bottom: 4px; }
.stat-label { font-size: 12px; color: #9CA3AF; }

/* ── Filter tabs ── */
.filter-tabs { display: flex; gap: 0; border-bottom: 1px solid #E5E7EB; margin-bottom: 20px; overflow-x: auto; }
.filter-tab { padding: 10px 18px; font-size: 13px; color: #6B7280; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; transition: all 0.2s; }
.filter-tab:hover { color: #1A1A1A; }
.filter-tab.active { color: #8B2635; border-bottom-color: #8B2635; font-weight: 500; }

/* ── Order cards ── */
.orders-list { display: flex; flex-direction: column; gap: 16px; }
.order-card { background: #fff; padding: 20px 24px; }
.oc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
.oc-id { font-size: 16px; font-weight: 600; color: #8B2635; letter-spacing: 0.05em; font-family: monospace; direction: ltr; }
.oc-date { font-size: 12px; color: #9CA3AF; margin-top: 2px; }
.oc-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 2px; font-size: 12px; font-weight: 500; }
.oc-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
.s-waiting   { background: #FEF9C3; color: #854D0E; } .s-waiting::before   { background: #EAB308; }
.s-making    { background: #DBEAFE; color: #1E40AF; } .s-making::before    { background: #3B82F6; }
.s-ready     { background: #EDE9FE; color: #5B21B6; } .s-ready::before     { background: #7C3AED; }
.s-sent      { background: #FED7AA; color: #9A3412; } .s-sent::before      { background: #F97316; }
.s-delivered { background: #D1FAE5; color: #065F46; } .s-delivered::before { background: #10B981; }
.s-canceled  { background: #FEE2E2; color: #991B1B; } .s-canceled::before  { background: #EF4444; }

.oc-body { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; font-size: 13px; }
.oc-field label { display: block; font-size: 11px; color: #9CA3AF; margin-bottom: 3px; }
.oc-field span { color: #1A1A1A; }
.oc-items { font-size: 12px; color: #6B7280; margin-bottom: 16px; line-height: 1.8; }
.oc-total { font-size: 15px; font-weight: 600; color: #1A1A1A; }

/* ── Actions ── */
.oc-actions { display: flex; gap: 10px; flex-wrap: wrap; border-top: 1px solid #F3F4F6; padding-top: 14px; }
.action-btn { height: 36px; padding: 0 16px; border: none; font-size: 13px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
.action-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }
.btn-approve { background: #ECFDF5; color: #065F46; } .btn-approve:hover { background: #D1FAE5; }
.btn-approve-time { background: #EEF2FF; color: #4338CA; } .btn-approve-time:hover { background: #E0E7FF; }
.btn-reject  { background: #FEF2F2; color: #991B1B; } .btn-reject:hover  { background: #FEE2E2; }
.btn-next-status { background: #F3F4F6; color: #374151; } .btn-next-status:hover { background: #E5E7EB; }
.no-orders { text-align: center; padding: 60px; color: #9CA3AF; font-size: 14px; background: #fff; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.hidden { display: none; }
.modal-box { background: #fff; padding: 32px; max-width: 420px; width: 100%; }
.modal-title { font-size: 16px; font-weight: 600; color: #1A1A1A; margin-bottom: 20px; }
.modal-field { margin-bottom: 16px; }
.modal-field label { font-size: 12px; color: #6B7280; display: block; margin-bottom: 6px; }
.modal-field input, .modal-field textarea, .modal-field select {
  width: 100%; height: 44px; border: 1.5px solid #E5E7EB; padding: 0 12px;
  font-size: 14px; color: #111; outline: none; font-family: inherit;
  -webkit-appearance: none;
}
.modal-field textarea { height: 80px; padding: 10px 12px; resize: vertical; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.modal-btn-cancel { height: 40px; padding: 0 20px; border: 1px solid #E5E7EB; background: none; color: #6B7280; cursor: pointer; font-family: inherit; font-size: 13px; }
.modal-btn-ok { height: 40px; padding: 0 20px; border: none; background: #8B2635; color: #fff; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; }
.modal-btn-ok:hover { background: #6E1D29; }

@media (max-width: 768px) {
  .admin-sidebar { width: 56px; }
  .sidebar-logo, .nav-item span, .btn-logout, .sidebar-footer p { display: none; }
  .nav-item { justify-content: center; padding: 14px; }
  .oc-body { grid-template-columns: 1fr; }
}
</style>
<link rel="stylesheet" href="assets/chatbot.css">
</head>
<body>

<!-- Login Screen -->
<div class="login-wrap" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <span>PIRO</span>
      <p>پنل مدیریت</p>
    </div>
    <div class="login-field">
      <label>کد دسترسی ادمین</label>
      <input type="password" id="adminCodeInput" placeholder="••••••••••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      <div class="login-err" id="loginErr">کد دسترسی نادرست است</div>
    </div>
    <button class="btn-login" onclick="doLogin()">ورود به پنل</button>
  </div>
</div>

<!-- Admin Dashboard -->
<div class="admin-layout" id="adminLayout" style="display:none">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <div class="brand">PIRO</div>
      <div class="sub">Admin Panel</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" onclick="setView('orders')">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>سفارشات</span>
      </div>
      <div class="nav-item" onclick="setView('stats')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>آمار</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="doLogout()">خروج</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-topbar">
      <div class="topbar-title" id="topbarTitle">سفارشات</div>
      <div class="topbar-date" id="topbarDate"></div>
    </div>
    <div class="admin-content" id="adminContent"></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeModal()">انصراف</button>
      <button class="modal-btn-ok" id="modalOkBtn">تأیید</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jalaali-js/dist/jalaali.js"></script>
<script>
const ADMIN_CODE = 'PIRO-ADMIN-2024';

function parsePrice(str) {
  if (typeof str === 'number') return str;
  return parseInt(String(str).replace(/[۰-۹]/g, d => '۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).replace(/,/g,'')) || 0;
}
function fmt(n) { return n.toLocaleString('fa-IR'); }

function toShamsi(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  const j = jalaali.toJalaali(d.getFullYear(), d.getMonth() + 1, d.getDate());
  const months = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
  return `${j.jd} ${months[j.jm-1]} ${j.jy}`;
}

function addDays(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString();
}

// ── Login ──
function doLogin() {
  const code = document.getElementById('adminCodeInput').value.trim();
  const err = document.getElementById('loginErr');
  if (code === ADMIN_CODE) {
    sessionStorage.setItem('piro_admin', '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminLayout').style.display = 'flex';
    initAdmin();
  } else {
    document.getElementById('adminCodeInput').classList.add('err');
    err.classList.add('show');
  }
}

function doLogout() {
  sessionStorage.removeItem('piro_admin');
  location.reload();
}

if (sessionStorage.getItem('piro_admin') === '1') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminLayout').style.display = 'flex';
}

// ── Data ──
function getOrders() { try { return JSON.parse(localStorage.getItem('piro_orders')||'[]'); } catch(e){return[];} }
function saveOrders(orders) { localStorage.setItem('piro_orders', JSON.stringify(orders)); }

// ── Topbar date ──
function setTopbarDate() {
  const now = new Date();
  const j = jalaali.toJalaali(now.getFullYear(), now.getMonth()+1, now.getDate());
  const months = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
  document.getElementById('topbarDate').textContent = `${j.jd} ${months[j.jm-1]} ${j.jy}`;
}

// ── Views ──
let activeFilter = 'all';

function setView(view) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event?.currentTarget?.classList.add('active');
  if (view === 'orders') { document.getElementById('topbarTitle').textContent = 'سفارشات'; renderOrders(); }
  if (view === 'stats')  { document.getElementById('topbarTitle').textContent = 'آمار'; renderStats(); }
}

function initAdmin() {
  setTopbarDate();
  renderOrders();
}

// ── Status utils ──
const STATUS_CLASS = {
  'در انتظار تأیید': 's-waiting',
  'در حال تولید':    's-making',
  'آماده ارسال':     's-ready',
  'ارسال شده':       's-sent',
  'تحویل داده شده':  's-delivered',
  'لغو شده':         's-canceled',
};

const NEXT_STATUS = {
  'در حال تولید':  'آماده ارسال',
  'آماده ارسال':   'ارسال شده',
  'ارسال شده':     'تحویل داده شده',
};

const FILTERS = [
  { key: 'all',     label: 'همه' },
  { key: 'pending', label: 'در انتظار تأیید' },
  { key: 'making',  label: 'در حال تولید' },
  { key: 'ready',   label: 'آماده ارسال' },
  { key: 'sent',    label: 'ارسال شده' },
  { key: 'done',    label: 'تحویل شده' },
  { key: 'canceled',label: 'لغو شده' },
];
const FILTER_STATUS = {
  pending: 'در انتظار تأیید', making: 'در حال تولید',
  ready: 'آماده ارسال', sent: 'ارسال شده',
  done: 'تحویل داده شده', canceled: 'لغو شده',
};

// ── Render orders ──
function renderOrders() {
  const orders = getOrders();
  const counts = {};
  orders.forEach(o => { counts[o.status] = (counts[o.status]||0) + 1; });

  const statsHtml = `
  <div class="stats-grid">
    <div class="stat-card waiting"><div class="stat-num">${counts['در انتظار تأیید']||0}</div><div class="stat-label">در انتظار تأیید</div></div>
    <div class="stat-card making"><div class="stat-num">${counts['در حال تولید']||0}</div><div class="stat-label">در حال تولید</div></div>
    <div class="stat-card ready"><div class="stat-num">${counts['آماده ارسال']||0}</div><div class="stat-label">آماده ارسال</div></div>
    <div class="stat-card sent"><div class="stat-num">${counts['ارسال شده']||0}</div><div class="stat-label">ارسال شده</div></div>
    <div class="stat-card delivered"><div class="stat-num">${counts['تحویل داده شده']||0}</div><div class="stat-label">تحویل شده</div></div>
    <div class="stat-card canceled"><div class="stat-num">${counts['لغو شده']||0}</div><div class="stat-label">لغو شده</div></div>
  </div>`;

  const tabsHtml = `
  <div class="filter-tabs">
    ${FILTERS.map(f => `
      <button class="filter-tab${activeFilter===f.key?' active':''}" onclick="setFilter('${f.key}')">
        ${f.label}${f.key!=='all'&&counts[FILTER_STATUS[f.key]]?` (${counts[FILTER_STATUS[f.key]]||0})` : ''}
      </button>`).join('')}
  </div>`;

  const filtered = activeFilter === 'all' ? orders
    : orders.filter(o => o.status === FILTER_STATUS[activeFilter]);

  const cardsHtml = filtered.length ? filtered.map(renderOrderCard).join('') : `<div class="no-orders">سفارشی در این دسته وجود ندارد</div>`;

  document.getElementById('adminContent').innerHTML = statsHtml + tabsHtml + `<div class="orders-list">${cardsHtml}</div>`;
}

function setFilter(key) {
  activeFilter = key;
  renderOrders();
}

function renderOrderCard(order) {
  const addr = order.address || {};
  const fullName = [addr.firstName, addr.lastName].filter(Boolean).join(' ') || '—';
  const addrShort = [addr.province ? `استان ${addr.province}` : '', addr.city].filter(Boolean).join('، ') || '—';
  const itemsSummary = (order.items||[]).map(i => `${i.name||'محصول'} × ${i.quantity||1}`).join(' | ');
  const cls = STATUS_CLASS[order.status] || '';
  const next = NEXT_STATUS[order.status];

  const actionsBtns = [];
  if (order.status === 'در انتظار تأیید') {
    actionsBtns.push(`<button class="action-btn btn-approve" onclick="approveOrder('${order.orderId}')">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> تأیید
    </button>`);
    actionsBtns.push(`<button class="action-btn btn-approve-time" onclick="approveWithTime('${order.orderId}')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> تأیید با تغییر زمان
    </button>`);
    actionsBtns.push(`<button class="action-btn btn-reject" onclick="rejectOrder('${order.orderId}')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> رد سفارش
    </button>`);
  }
  if (next) {
    actionsBtns.push(`<button class="action-btn btn-next-status" onclick="nextStatus('${order.orderId}')">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg> ${next}
    </button>`);
  }

  return `
  <div class="order-card" id="oc-${order.orderId}">
    <div class="oc-top">
      <div>
        <div class="oc-id">${order.orderId}</div>
        <div class="oc-date">تاریخ ثبت: ${toShamsi(order.date)}</div>
      </div>
      <div class="oc-status ${cls}">${order.status}</div>
    </div>
    <div class="oc-body">
      <div class="oc-field"><label>نام مشتری</label><span>${fullName}</span></div>
      <div class="oc-field"><label>موبایل</label><span dir="ltr">${addr.mobile||'—'}</span></div>
      <div class="oc-field"><label>استان / شهر</label><span>${addrShort}</span></div>
      <div class="oc-field"><label>تاریخ تحویل تخمینی</label><span style="color:#8B2635">${toShamsi(order.deliveryDate)}</span></div>
    </div>
    ${itemsSummary ? `<div class="oc-items">${itemsSummary}</div>` : ''}
    <div class="oc-total">${fmt(order.total||0)} تومان</div>
    ${actionsBtns.length ? `<div class="oc-actions">${actionsBtns.join('')}</div>` : ''}
  </div>`;
}

// ── Actions ──
function approveOrder(orderId) {
  const orders = getOrders();
  const idx = orders.findIndex(o => o.orderId === orderId);
  if (idx < 0) return;
  orders[idx].status = 'در حال تولید';
  orders[idx].cancelable = false;
  orders[idx].productionStarted = true;
  saveOrders(orders);
  renderOrders();
}

function approveWithTime(orderId) {
  const orders = getOrders();
  const order = orders.find(o => o.orderId === orderId);
  if (!order) return;

  openModal('تأیید با تغییر زمان تحویل', `
    <div class="modal-field">
      <label>تعداد روز کاری جدید (از امروز)</label>
      <input type="number" id="newDaysInput" value="${order.deliveryDays||60}" min="1" max="365">
    </div>
    <div style="font-size:12px;color:#9CA3AF;margin-top:8px">زمان تحویل جدید بر اساس امروز محاسبه می‌شود</div>`,
    () => {
      const days = parseInt(document.getElementById('newDaysInput')?.value) || 60;
      const idx = orders.findIndex(o => o.orderId === orderId);
      if (idx < 0) return;
      orders[idx].deliveryDays = days;
      orders[idx].deliveryDate = addDays(new Date().toISOString(), days);
      orders[idx].status = 'در حال تولید';
      orders[idx].cancelable = false;
      orders[idx].productionStarted = true;
      saveOrders(orders);
      renderOrders();
    });
}

function rejectOrder(orderId) {
  openModal('رد سفارش', `
    <div class="modal-field">
      <label>دلیل رد سفارش (اختیاری)</label>
      <textarea id="rejectReason" placeholder="دلیل رد سفارش را بنویسید..."></textarea>
    </div>`,
    () => {
      const reason = document.getElementById('rejectReason')?.value.trim() || '';
      const orders = getOrders();
      const idx = orders.findIndex(o => o.orderId === orderId);
      if (idx < 0) return;
      orders[idx].status = 'لغو شده';
      orders[idx].cancelable = false;
      orders[idx].cancelReason = reason;
      saveOrders(orders);
      renderOrders();
    });
}

function nextStatus(orderId) {
  const orders = getOrders();
  const idx = orders.findIndex(o => o.orderId === orderId);
  if (idx < 0) return;
  const next = NEXT_STATUS[orders[idx].status];
  if (!next) return;
  if (!confirm(`وضعیت سفارش به «${next}» تغییر کند؟`)) return;
  orders[idx].status = next;
  saveOrders(orders);
  renderOrders();
}

// ── Stats view ──
function renderStats() {
  const orders = getOrders();
  const total = orders.reduce((s, o) => s + (o.total||0), 0);
  const counts = {};
  orders.forEach(o => { counts[o.status] = (counts[o.status]||0)+1; });
  document.getElementById('adminContent').innerHTML = `
  <div class="stats-grid" style="margin-bottom:28px">
    <div class="stat-card" style="border-color:#8B2635">
      <div class="stat-num">${orders.length}</div>
      <div class="stat-label">کل سفارشات</div>
    </div>
    <div class="stat-card" style="border-color:#10B981">
      <div class="stat-num" style="font-size:20px">${fmt(total)}</div>
      <div class="stat-label">مجموع فروش (تومان)</div>
    </div>
    <div class="stat-card waiting"><div class="stat-num">${counts['در انتظار تأیید']||0}</div><div class="stat-label">در انتظار تأیید</div></div>
    <div class="stat-card making"><div class="stat-num">${counts['در حال تولید']||0}</div><div class="stat-label">در حال تولید</div></div>
    <div class="stat-card delivered"><div class="stat-num">${counts['تحویل داده شده']||0}</div><div class="stat-label">تحویل شده</div></div>
    <div class="stat-card canceled"><div class="stat-num">${counts['لغو شده']||0}</div><div class="stat-label">لغو شده</div></div>
  </div>`;
}

// ── Modal ──
let modalCallback = null;
function openModal(title, bodyHtml, onOk) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  modalCallback = onOk;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); modalCallback = null; }
document.getElementById('modalOkBtn').addEventListener('click', () => { if (modalCallback) { modalCallback(); closeModal(); } });
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

// ── Init ──
if (sessionStorage.getItem('piro_admin') === '1') initAdmin();
</script>

<script src="assets/chatbot.js"></script>
</body>
